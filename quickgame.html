<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>This or That — Conversation Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Top bar */
        .top-bar {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px 10px;
        }
        .timer-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .timer-box .dot { width: 10px; height: 10px; border-radius: 50%; background: #00e676; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.3; } }
        .timer-box.warning .dot { background: #ff9800; }
        .timer-box.danger .dot { background: #f44336; }
        .round-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        /* Category selector */
        .category-bar {
            width: 100%;
            max-width: 800px;
            padding: 6px 24px 14px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .cat-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #ccc;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.82rem;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            transition: all 0.25s;
        }
        .cat-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .cat-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border-color: transparent;
        }

        /* Main card */
        .card {
            width: 90%;
            max-width: 700px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 28px;
            padding: 40px 30px 34px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.35s;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(102,126,234,0.15), transparent 60%);
            pointer-events: none;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            color: rgba(255,255,255,0.65);
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        .topic-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #667eea;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .battle-area {
            display: flex;
            align-items: stretch;
            gap: 0;
            margin: 10px 0 0;
        }

        .option-btn {
            flex: 1;
            background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
            border: 2px solid rgba(255,255,255,0.12);
            color: #fff;
            padding: 28px 16px 20px;
            border-radius: 18px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            text-align: center;
            line-height: 1.3;
        }
        .option-btn .thai {
            display: block;
            font-size: 0.85rem;
            font-weight: 400;
            color: rgba(255,255,255,0.45);
            margin-top: 6px;
            transition: color 0.3s;
        }
        .option-btn .thai.hidden { display: none; }
        .option-btn:hover {
            border-color: #667eea;
            background: linear-gradient(145deg, rgba(102,126,234,0.2), rgba(118,75,162,0.15));
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 35px rgba(102,126,234,0.25);
        }
        .option-btn:hover .thai { color: rgba(255,255,255,0.7); }
        .option-btn:active { transform: scale(0.97); }

        .vs-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 55px;
            font-weight: 800;
            font-size: 1.1rem;
            color: rgba(255,255,255,0.25);
            letter-spacing: 2px;
        }

        /* Progress bar */
        .progress-track {
            width: 100%;
            max-width: 700px;
            height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
            margin-top: 18px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .ctrl-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: #ccc;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.25s;
        }
        .ctrl-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .ctrl-btn.thai-toggle.active { background: linear-gradient(135deg, #f093fb, #f5576c); border-color: transparent; color: #fff; }

        /* End screen */
        .end-screen {
            text-align: center;
            padding: 30px;
        }
        .end-screen h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #667eea, #f093fb);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            margin-bottom: 10px;
        }
        .end-screen p { color: rgba(255,255,255,0.6); font-size: 1rem; margin-bottom: 24px; }
        .restart-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: #fff;
            padding: 14px 40px;
            border-radius: 30px;
            font-family: 'Poppins', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
        }
        .restart-btn:hover { transform: scale(1.05); box-shadow: 0 8px 30px rgba(102,126,234,0.4); }

        /* Animations */
        .card.slide-in { animation: slideIn 0.4s ease forwards; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 550px) {
            .option-btn { font-size: 1.05rem; padding: 22px 12px 16px; }
            .card { padding: 28px 18px 24px; }
        }
    </style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
    <div class="timer-box" id="timerBox">
        <div class="dot"></div>
        <span id="timerDisplay">40:00</span>
    </div>
    <div class="round-badge">Round <span id="roundNum">1</span> / <span id="totalRounds">0</span></div>
</div>

<!-- Category Bar -->
<div class="category-bar" id="categoryBar"></div>

<!-- Main Card -->
<div class="card slide-in" id="mainCard">
    <div class="topic-label" id="topicLabel">LIFESTYLE</div>
    <div class="question-text">Which do you prefer?</div>
    <div class="battle-area">
        <button class="option-btn" id="opt1" onclick="pick(0)">
            <span class="en">Option 1</span>
            <span class="thai hidden" id="thai1">ตัวเลือก 1</span>
        </button>
        <div class="vs-divider">VS</div>
        <button class="option-btn" id="opt2" onclick="pick(1)">
            <span class="en">Option 2</span>
            <span class="thai hidden" id="thai2">ตัวเลือก 2</span>
        </button>
    </div>
</div>

<!-- Progress -->
<div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
</div>

<!-- Controls -->
<div class="controls">
    <button class="ctrl-btn thai-toggle" id="thaiToggle" onclick="toggleThai()">🇹🇭 Thai / ไทย</button>
    <button class="ctrl-btn" onclick="skipQuestion()">Skip ⏭️</button>
    <button class="ctrl-btn" onclick="shuffleCurrent()">Shuffle 🔀</button>
</div>

// ── STATE ──
let currentCategory = "all";
let activePairs = [];
let currentRound = 0;
let showThai = false;
let timerInterval = null;
let totalSeconds = 40 * 60; // 40 minutes

// ── INIT ──
function init() {
    buildCategoryBar();
    setCategory("all");
    startTimer();
}

function buildCategoryBar() {
    const bar = document.getElementById('categoryBar');
    let html = `<button class="cat-btn active" data-cat="all" onclick="setCategory('all')">All Topics</button>`;
    for (const cat of Object.keys(topics)) {
        html += `<button class="cat-btn" data-cat="${cat}" onclick="setCategory('${cat}')">${cat}</button>`;
    }
    bar.innerHTML = html;
}

function setCategory(cat) {
    currentCategory = cat;
    // highlight
    document.querySelectorAll('.cat-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.cat === cat);
    });
    // build pairs
    if (cat === "all") {
        activePairs = [];
        for (const c of Object.keys(topics)) activePairs.push(...topics[c].map(p => ({cat: c, data: p})));
    } else {
        activePairs = topics[cat].map(p => ({cat, data: p}));
    }
    shuffle(activePairs);
    currentRound = 0;
    document.getElementById('totalRounds').textContent = activePairs.length;
    updateDisplay();
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

// ── DISPLAY ──
function updateDisplay() {
    const card = document.getElementById('mainCard');
    if (currentRound >= activePairs.length) {
        card.innerHTML = `
            <div class="end-screen">
                <h1>Awesome! 🎉</h1>
                <p>You finished all ${activePairs.length} questions!<br>ทำครบทุกคำถามแล้ว!</p>
                <button class="restart-btn" onclick="location.reload()">Play Again</button>
            </div>`;
        document.getElementById('progressFill').style.width = '100%';
        return;
    }

    const pair = activePairs[currentRound];
    const [en1, th1, en2, th2] = pair.data;
    const thaiClass = showThai ? '' : 'hidden';

    card.innerHTML = `
        <div class="topic-label" id="topicLabel">${pair.cat}</div>
        <div class="question-text">Which do you prefer?</div>
        <div class="battle-area">
            <button class="option-btn" onclick="pick(0)">
                <span class="en">${en1}</span>
                <span class="thai ${thaiClass}">${th1}</span>
            </button>
            <div class="vs-divider">VS</div>
            <button class="option-btn" onclick="pick(1)">
                <span class="en">${en2}</span>
                <span class="thai ${thaiClass}">${th2}</span>
            </button>
        </div>`;

    // animate
    card.classList.remove('slide-in');
    void card.offsetWidth;
    card.classList.add('slide-in');

    document.getElementById('roundNum').textContent = currentRound + 1;
    document.getElementById('progressFill').style.width = ((currentRound) / activePairs.length * 100) + '%';
}

function pick(idx) {
    currentRound++;
    updateDisplay();
}

function skipQuestion() {
    // move current to end
    if (currentRound < activePairs.length) {
        activePairs.push(activePairs.splice(currentRound, 1)[0]);
        updateDisplay();
    }
}

function shuffleCurrent() {
    const remaining = activePairs.splice(currentRound);
    shuffle(remaining);
    activePairs.push(...remaining);
    updateDisplay();
}

// ── THAI TOGGLE ──
function toggleThai() {
    showThai = !showThai;
    document.getElementById('thaiToggle').classList.toggle('active', showThai);
    document.querySelectorAll('.thai').forEach(el => el.classList.toggle('hidden', !showThai));
}

// ── TIMER ──
function startTimer() {
    updateTimerDisplay();
    timerInterval = setInterval(() => {
        totalSeconds--;
        if (totalSeconds <= 0) { totalSeconds = 0; clearInterval(timerInterval); }
        updateTimerDisplay();
    }, 1000);
}

function updateTimerDisplay() {
    const m = Math.floor(totalSeconds / 60);
    const s = totalSeconds % 60;
    document.getElementById('timerDisplay').textContent =
        String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    const box = document.getElementById('timerBox');
    box.classList.remove('warning','danger');
    if (totalSeconds <= 300) box.classList.add('danger');
    else if (totalSeconds <= 600) box.classList.add('warning');
}

// ── GO ──
init();
</script>
