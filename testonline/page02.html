<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Lewis1 – TikTok Vertical Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #D4A843;
    --gold-light: #F0C96A;
    --gold-dark: #A07820;
    --teal: #1A6B6B;
    --teal-light: #2A9090;
    --teal-dark: #0D4040;
    --cream: #FDF6E8;
    --red-accent: #C0392B;
    --white: #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
  }

  .scaler {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
  }

  .canvas {
    position: absolute;
    top: 0; left: 0;
    width: 430px;
    height: 932px;
    transform-origin: top left;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    background: transparent;
  }

  /* ── TOP BANNER ── */
  .top-banner {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 160px;
    background: linear-gradient(160deg, var(--teal-dark) 0%, var(--teal) 60%, var(--teal-light) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 18px 24px 14px;
    clip-path: polygon(0 0, 100% 0, 100% 82%, 50% 100%, 0 82%);
    z-index: 10;
  }
  .top-banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(212,168,67,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(212,168,67,0.15) 0%, transparent 60%);
    pointer-events: none;
  }
  .teacher-name {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 30px;
    color: var(--cream);
    letter-spacing: 1px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    line-height: 1.1;
  }
  .teacher-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 3.5px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── CORNER ORNAMENTS ── */
  .corner {
    position: absolute;
    width: 70px; height: 70px;
    z-index: 20;
    pointer-events: none;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner-tl { top: 0; left: 0; }
  .corner-tr { top: 0; right: 0; transform: scaleX(-1); }

  /* ── LIVE BADGE ── */
  .live-badge {
    position: absolute;
    top: 168px; right: 20px;
    background: var(--red-accent);
    color: white;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2.5px;
    padding: 5px 14px;
    border-radius: 20px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 4px 16px rgba(192,57,43,0.5);
    z-index: 15;
    animation: livePulse 2s ease-in-out infinite;
  }
  .live-badge .dot {
    width: 7px; height: 7px;
    background: white;
    border-radius: 50%;
    animation: dotBlink 1.2s ease-in-out infinite;
  }
  @keyframes livePulse {
    0%, 100% { box-shadow: 0 4px 16px rgba(192,57,43,0.5); }
    50%       { box-shadow: 0 4px 28px rgba(192,57,43,0.85); }
  }
  @keyframes dotBlink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.2; }
  }

  /* ── SIDE LABEL ── */
  .side-label {
    position: absolute;
    top: 168px; left: 20px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: var(--teal-dark);
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 2px;
    padding: 5px 12px;
    border-radius: 20px;
    text-transform: uppercase;
    z-index: 15;
    box-shadow: 0 3px 12px rgba(160,120,32,0.4);
  }

  /* ── TOPIC BOX — Adjusted Top ── */
  .topic-box {
    position: absolute;
    top: 220px; /* Moved up since ring is gone */
    left: 20px; right: 20px;
    background: rgba(13,64,64,0.82);
    border: 1px solid rgba(212,168,67,0.35);
    border-radius: 12px;
    padding: 12px 16px;
    backdrop-filter: blur(6px);
    z-index: 10;
  }
  .topic-label {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .topic-text {
    font-family: 'Playfair Display', serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--cream);
    line-height: 1.2;
    background: transparent;
    border: none;
    outline: none;
    width: 100%;
    caret-color: var(--gold);
  }
  .topic-sub {
    font-size: 10px;
    color: rgba(240,201,106,0.75);
    font-weight: 600;
    background: transparent;
    border: none;
    outline: none;
    width: 100%;
  }

  /* ── LEVEL PILLS ── */
  .levels-row {
    position: absolute;
    top: 324px; /* Adjusted relative to new Topic Box position */
    left: 20px; right: 20px;
    display: flex;
    gap: 8px;
    z-index: 10;
  }
  .pill {
    flex: 1;
    text-align: center;
    padding: 7px 4px;
    border-radius: 30px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border: 1px solid rgba(212,168,67,0.3);
    background: rgba(26,107,107,0.55);
    color: rgba(240,201,106,0.9);
    backdrop-filter: blur(4px);
    cursor: pointer;
    transition: all 0.4s ease;
  }
  .pill.active {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: var(--teal-dark);
    border-color: var(--gold);
    box-shadow: 0 3px 12px rgba(212,168,67,0.5);
  }

  .gold-divider {
    position: absolute;
    left: 20px; right: 20px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), rgba(212,168,67,0.3), transparent);
    z-index: 10;
  }
  .d1 { top: 366px; }

  /* ── STATS ROW ── */
  .stats-row {
    position: absolute;
    top: 378px;
    left: 20px; right: 20px;
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  .stat-card {
    flex: 1;
    background: rgba(13,64,64,0.75);
    border: 1px solid rgba(212,168,67,0.2);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
  }
  .stat-value {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--gold-light);
  }
  .stat-label {
    font-size: 7px;
    font-weight: 700;
    color: rgba(253,246,232,0.55);
    text-transform: uppercase;
  }

  /* ── PHRASE OF THE DAY ── */
  .phrase-box {
    position: absolute;
    top: 464px;
    left: 20px; right: 20px;
    background: linear-gradient(135deg, rgba(160,120,32,0.22), rgba(212,168,67,0.12));
    border: 1px solid rgba(212,168,67,0.4);
    border-radius: 12px;
    padding: 12px 16px;
    z-index: 10;
  }
  .phrase-english {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: var(--cream);
    font-style: italic;
  }

  /* ── BOOK A LESSON ── */
  .book-box {
    position: absolute;
    bottom: 100px;
    left: 20px; right: 20px;
    background: linear-gradient(135deg, var(--teal-dark), var(--teal));
    border: 1px solid var(--gold);
    border-radius: 12px;
    padding: 10px 16px;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .book-btn {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: var(--teal-dark);
    font-size: 9px;
    font-weight: 800;
    padding: 8px 14px;
    border-radius: 20px;
  }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 76px;
    background: linear-gradient(0deg, var(--teal-dark) 0%, var(--teal) 70%, transparent 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 14px;
    clip-path: polygon(0 18%, 50% 0%, 100% 18%, 100% 100%, 0 100%);
    z-index: 10;
  }

  .shimmer-text {
    background: linear-gradient(90deg, var(--gold-dark) 0%, var(--gold-light) 40%, var(--gold-dark) 60%, var(--gold-light) 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 4s linear infinite;
  }
  @keyframes shimmer {
    0%   { background-position: -200% center; }
    100% { background-position:  200% center; }
  }

  .particle {
    position: absolute;
    color: rgba(212,168,67,0.18);
    font-size: 14px;
    pointer-events: none;
    animation: floatUp linear infinite;
    z-index: 1;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg);  opacity: 0; }
    10%  { opacity: 1; }
    100% { transform: translateY(-900px) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="scaler">
  <div class="canvas" id="canvas">

    <div class="particle" style="left:8%;  top:700px; animation-duration:18s;">✿</div>
    <div class="particle" style="left:70%; top:720px; animation-duration:16s;">✦</div>

    <div class="corner corner-tl">
      <svg viewBox="0 0 70 70" fill="none">
        <path d="M4 4 L30 4 Q4 4 4 30 Z" fill="rgba(212,168,67,0.5)"/>
        <circle cx="10" cy="10" r="3" fill="rgba(212,168,67,0.7)"/>
      </svg>
    </div>
    <div class="corner corner-tr"></div>

    <div class="top-banner">
      <img src="logo.png" alt="Logo" style="width:54px;height:54px;border-radius:50%;object-fit:cover;border:2px solid rgba(212,168,67,0.6);margin-bottom:6px;"/>
      <div class="teacher-name">Teacher <span class="shimmer-text">Lewis1</span></div>
      <div class="teacher-title">✦ &nbsp; English Online &nbsp; ✦</div>
    </div>

    <div class="live-badge"><span class="dot"></span>LIVE</div>

    <div class="side-label">🇬🇧 Free Class</div>

    <div class="topic-box">
      <div class="topic-label">Today's Topic ✏️</div>
      <input class="topic-text" id="topicTitle" type="text" value="Everyday Conversations" />
      <div class="topic-sub-wrap">
        <input class="topic-sub" id="topicSub" type="text" value="📌 Greetings · Introductions · Small Talk" />
      </div>
    </div>

    <div class="levels-row" id="pillsRow">
      <div class="pill active" onclick="setActivePill(0)">Beginner</div>
      <div class="pill" onclick="setActivePill(1)">Elementary</div>
      <div class="pill" onclick="setActivePill(2)">Pre-Int</div>
    </div>

    <div class="gold-divider d1"></div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value">5+</div>
        <div class="stat-label">Yrs Exp</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">Elite</div>
        <div class="stat-label">Class Only</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">4.9</div>
        <div class="stat-label">Rating</div>
      </div>
    </div>

    <div class="phrase-box">
      <div class="phrase-label">Phrase of the Day</div>
      <div class="phrase-english">"How are you doing today?"</div>
      <div class="phrase-translation">🇹🇭 วันนี้เป็นยังไงบ้าง?&nbsp;&nbsp;</div>
    </div>

    <div class="book-box">
      <div class="book-left">
        <div class="book-label">✦ Limited Spots</div>
        <div class="book-title">Book a Lesson Now</div>
      </div>
      <div class="book-btn">📩 DM Me</div>
    </div>

    <div class="bottom-bar">
      <div class="bottom-handle">@TeacherLewis1</div>
    </div>

  </div>
</div>

<script>
  function scaleCanvas() {
    const canvas = document.getElementById('canvas');
    const scale = Math.min(window.innerWidth / 430, window.innerHeight / 932);
    canvas.style.transform = `scale(${scale})`;
    canvas.style.left = ((window.innerWidth - 430 * scale) / 2) + 'px';
  }
  scaleCanvas();
  window.addEventListener('resize', scaleCanvas);

  const pills = document.querySelectorAll('#pillsRow .pill');
  let currentPill = 0;
  function rotatePill() {
    pills[currentPill].classList.remove('active');
    currentPill = (currentPill + 1) % pills.length;
    pills[currentPill].classList.add('active');
  }
  let pillTimer = setInterval(rotatePill, 3000);

  function setActivePill(index) {
    clearInterval(pillTimer);
    pills.forEach(p => p.classList.remove('active'));
    pills[index].classList.add('active');
    currentPill = index;
    pillTimer = setInterval(rotatePill, 3000);
  }
</script>

</body>
</html>
