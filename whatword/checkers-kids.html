<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkers - Past Tense Practice</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    padding: 10px;
  }
  h1 {
    font-size: 1.8rem;
    margin-bottom: 8px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
  }
  #turn-indicator {
    font-size: 1.1rem;
    margin-bottom: 10px;
    padding: 6px 20px;
    border-radius: 20px;
    font-weight: 600;
    transition: background 0.3s;
  }
  #turn-indicator.red { background: #e74c3c; }
  #turn-indicator.blue { background: #2980b9; }

  #board-container {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    width: min(90vw, 500px);
    height: min(90vw, 500px);
    border: 4px solid #f9ca24;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }

  .cell {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: default;
  }
  .cell.light { background: #ffeaa7; }
  .cell.dark { background: #fdcb6e; }
  .cell.valid-move {
    cursor: pointer;
  }
  .cell.valid-move::after {
    content: '';
    width: 30%;
    height: 30%;
    background: rgba(46, 204, 113, 0.8);
    border-radius: 50%;
    position: absolute;
    animation: pulse 1s infinite;
  }
  .cell.valid-jump::after {
    content: '';
    width: 40%;
    height: 40%;
    background: rgba(231, 76, 60, 0.8);
    border-radius: 50%;
    position: absolute;
    animation: pulse 0.7s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.2); opacity: 1; }
  }

  .piece {
    width: 75%;
    height: 75%;
    border-radius: 50%;
    cursor: pointer;
    position: relative;
    transition: transform 0.15s, box-shadow 0.15s;
    z-index: 2;
  }
  .piece:hover { transform: scale(1.08); }
  .piece.red-piece {
    background: radial-gradient(circle at 35% 35%, #ff7979, #e74c3c);
    border: 3px solid #c0392b;
    box-shadow: 0 3px 8px rgba(0,0,0,0.3), inset 0 -2px 4px rgba(0,0,0,0.15);
  }
  .piece.blue-piece {
    background: radial-gradient(circle at 35% 35%, #74b9ff, #2980b9);
    border: 3px solid #2471a3;
    box-shadow: 0 3px 8px rgba(0,0,0,0.3), inset 0 -2px 4px rgba(0,0,0,0.15);
  }
  .piece.selected {
    transform: scale(1.1);
    box-shadow: 0 0 0 4px #f1c40f, 0 4px 15px rgba(241, 196, 15, 0.6);
  }
  .piece.king::after {
    content: '👑';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.4em;
  }
  .piece-num {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 0.85em;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.7);
    z-index: 3;
    pointer-events: none;
    user-select: none;
  }
  .piece.king .piece-num {
    top: 28%;
    font-size: 0.7em;
  }

  #prompt-box {
    margin-top: 14px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 16px;
    padding: 16px 24px;
    max-width: min(90vw, 500px);
    width: 100%;
    text-align: center;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
  }
  #prompt-box .label {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #f9ca24;
    margin-bottom: 6px;
  }
  #prompt-box .prompt-text {
    font-size: 1.2rem;
    font-weight: 500;
    line-height: 1.5;
  }
  #thai-text {
    font-size: 1.1rem;
    color: #dfe6e9;
    margin-top: 6px;
    display: none;
    line-height: 1.5;
  }
  #thai-text.show { display: block; }
  #translate-btn {
    margin-top: 10px;
    padding: 6px 18px;
    border: 2px solid #dfe6e9;
    border-radius: 16px;
    background: transparent;
    color: #dfe6e9;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  #translate-btn:hover {
    background: #dfe6e9;
    color: #764ba2;
  }

  #score-bar {
    display: flex;
    gap: 30px;
    margin-bottom: 8px;
    font-size: 1rem;
  }
  .score { padding: 4px 14px; border-radius: 10px; font-weight: 600; }
  .score.red { background: #e74c3c; }
  .score.blue { background: #2980b9; }

  #reset-btn {
    margin-top: 12px;
    padding: 8px 28px;
    border: none;
    border-radius: 20px;
    background: #00b894;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  #reset-btn:hover { background: #00a381; }

  #winner-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;

  #winner-box {

    color: #333;
    padding: 40px 50px;
    border-radius: 20px;
    text-align: center;

  #winner-box button {

    padding: 10px 30px;
    border: none;
    border-radius: 20px;
    background: #00b894;
    color: #fff;
    font-size: 1.1rem;
    cursor: pointer;
    font-weight: 600;
  }
  #winner-box button:hover { background: #00a381; }
</style>
</head>

function initGame() {
  board = [];
  for (let r = 0; r < 8; r++) {
    board[r] = [];
    for (let c = 0; c < 8; c++) {
      board[r][c] = null;
      if ((r + c) % 2 === 1) {
        if (r < 3) board[r][c] = { color: 'blue', king: false, num: 0 };
        if (r > 4) board[r][c] = { color: 'red', king: false, num: 0 };
      }
    }
  }
  let redNum = 1, blueNum = 1;
  for (let r = 7; r >= 0; r--)
    for (let c = 0; c < 8; c++)
      if (board[r][c] && board[r][c].color === 'red') board[r][c].num = redNum++;
  for (let r = 0; r < 8; r++)
    for (let c = 0; c < 8; c++)
      if (board[r][c] && board[r][c].color === 'blue') board[r][c].num = blueNum++;

  currentTurn = 'red';
  selectedPiece = null;
  validMoves = [];
  usedPrompts = [];
  currentPromptIdx = -1;
  updateTurnIndicator();
  updateScores();
  render();
  document.getElementById('prompt-text').textContent = 'Move a piece to get a question!';
  document.getElementById('thai-text').textContent = '';
  document.getElementById('thai-text').classList.remove('show');
}

function updateTurnIndicator() {
  const el = document.getElementById('turn-indicator');
  el.textContent = currentTurn === 'red' ? "🔴 Red's Turn" : "🔵 Blue's Turn";
  el.className = currentTurn;
}

function updateScores() {
  let red = 0, blue = 0;
  for (let r = 0; r < 8; r++)
    for (let c = 0; c < 8; c++)
      if (board[r][c]) board[r][c].color === 'red' ? red++ : blue++;
  document.getElementById('red-score').textContent = red;
  document.getElementById('blue-score').textContent = blue;
  if (red === 0) showWinner('Blue');
  if (blue === 0) showWinner('Red');
}

function showWinner(color) {
  document.getElementById('winner-msg').textContent = color + ' Wins! 🏆🎉';
  document.getElementById('winner-overlay').classList.add('show');
}

function getValidMoves(r, c) {
  const piece = board[r][c];
  if (!piece) return [];
  const moves = [];
  const dirs = [];
  if (piece.color === 'red' || piece.king) dirs.push(-1);
  if (piece.color === 'blue' || piece.king) dirs.push(1);
  const sides = [-1, 1];

  for (const dr of dirs) {
    for (const dc of sides) {
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8) {
        if (!board[nr][nc]) {
          moves.push({ row: nr, col: nc, isJump: false });
        } else if (board[nr][nc].color !== piece.color) {
          const jr = nr + dr, jc = nc + dc;
          if (jr >= 0 && jr < 8 && jc >= 0 && jc < 8 && !board[jr][jc]) {
            moves.push({ row: jr, col: jc, isJump: true, jumpRow: nr, jumpCol: nc });
          }
        }
      }
    }
  }
  return moves;
}

function hasJumpMoves(color) {
  for (let r = 0; r < 8; r++)
    for (let c = 0; c < 8; c++)
      if (board[r][c] && board[r][c].color === color) {
        const moves = getValidMoves(r, c);
        if (moves.some(m => m.isJump)) return true;
      }
  return false;
}

function hasAnyMoves(color) {
  for (let r = 0; r < 8; r++)
    for (let c = 0; c < 8; c++)
      if (board[r][c] && board[r][c].color === color)
        if (getValidMoves(r, c).length > 0) return true;
  return false;
}

function selectPiece(r, c) {
  if (!board[r][c] || board[r][c].color !== currentTurn) return;

  const mustJump = hasJumpMoves(currentTurn);
  let moves = getValidMoves(r, c);
  if (mustJump) moves = moves.filter(m => m.isJump);
  if (moves.length === 0) return;

  selectedPiece = { row: r, col: c };
  validMoves = moves;
  render();
}

function movePiece(target) {
  const move = validMoves.find(m => m.row === target.row && m.col === target.col);
  if (!move) return;

  const sr = selectedPiece.row, sc = selectedPiece.col;
  board[move.row][move.col] = board[sr][sc];
  board[sr][sc] = null;

  let captured = false;
  if (move.isJump) {
    board[move.jumpRow][move.jumpCol] = null;
    captured = true;
  }

  if (board[move.row][move.col].color === 'red' && move.row === 0)
    board[move.row][move.col].king = true;
  if (board[move.row][move.col].color === 'blue' && move.row === 7)
    board[move.row][move.col].king = true;

  if (captured) {
    const nextJumps = getValidMoves(move.row, move.col).filter(m => m.isJump);
    if (nextJumps.length > 0) {
      selectedPiece = { row: move.row, col: move.col };
      validMoves = nextJumps;
      updateScores();
      render();
      showPrompt();
      return;
    }
  }

  selectedPiece = null;
  validMoves = [];
  currentTurn = currentTurn === 'red' ? 'blue' : 'red';
  updateTurnIndicator();
  updateScores();
  render();
  showPrompt();

  if (!hasAnyMoves(currentTurn)) {
    const winner = currentTurn === 'red' ? 'Blue' : 'Red';
    setTimeout(() => showWinner(winner), 300);
  }
}

function showPrompt() {
  if (usedPrompts.length >= prompts.length) usedPrompts = [];
  let idx;
  do {
    idx = Math.floor(Math.random() * prompts.length);
  } while (usedPrompts.includes(idx));
  usedPrompts.push(idx);
  currentPromptIdx = idx;
  document.getElementById('prompt-text').textContent = prompts[idx];
  document.getElementById('thai-text').textContent = '';
  document.getElementById('thai-text').classList.remove('show');
}

function toggleThai() {
  const el = document.getElementById('thai-text');
  if (currentPromptIdx < 0) return;
  if (el.classList.contains('show')) {
    el.classList.remove('show');
  } else {
    el.textContent = thaiTranslations[currentPromptIdx] || '';
    el.classList.add('show');
  }
}

function onCellClick(r, c) {
  if (selectedPiece && validMoves.find(m => m.row === r && m.col === c)) {
    movePiece({ row: r, col: c });
    return;
  }
  if (board[r][c] && board[r][c].color === currentTurn) {
    selectPiece(r, c);
    return;
  }
  selectedPiece = null;
  validMoves = [];
  render();
}

function render() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell ' + ((r + c) % 2 === 0 ? 'light' : 'dark');

      const isValid = validMoves.find(m => m.row === r && m.col === c);
      if (isValid) {
        cell.classList.add(isValid.isJump ? 'valid-jump' : 'valid-move');
      }

      cell.addEventListener('click', () => onCellClick(r, c));

      if (board[r][c]) {
        const piece = document.createElement('div');
        piece.className = 'piece ' + board[r][c].color + '-piece';
        if (board[r][c].king) piece.classList.add('king');
        if (selectedPiece && selectedPiece.row === r && selectedPiece.col === c) {
          piece.classList.add('selected');
        }
        const numSpan = document.createElement('span');
        numSpan.className = 'piece-num';
        numSpan.textContent = board[r][c].num;
        piece.appendChild(numSpan);
        cell.appendChild(piece);
      }

      boardEl.appendChild(cell);
    }
  }
}

initGame();
</script>
