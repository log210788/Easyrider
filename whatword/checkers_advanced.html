<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkers - Advanced Conversation Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    padding: 10px;
  }
  h1 {
    font-size: 1.8rem;
    margin-bottom: 8px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  }
  #turn-indicator {
    font-size: 1.1rem;
    margin-bottom: 10px;
    padding: 6px 20px;
    border-radius: 20px;
    font-weight: 600;
    transition: background 0.3s;
  }
  #turn-indicator.red { background: #c0392b; }
  #turn-indicator.black { background: #2c3e50; }

  #board-container {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    width: min(90vw, 500px);
    height: min(90vw, 500px);
    border: 4px solid #e2b06f;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }

  .cell {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: default;
  }
  .cell.light { background: #f0d9b5; }
  .cell.dark { background: #b58863; }
  .cell.valid-move {
    cursor: pointer;
  }
  .cell.valid-move::after {
    content: '';
    width: 30%;
    height: 30%;
    background: rgba(46, 204, 113, 0.7);
    border-radius: 50%;
    position: absolute;
    animation: pulse 1s infinite;
  }
  .cell.valid-jump::after {
    content: '';
    width: 40%;
    height: 40%;
    background: rgba(231, 76, 60, 0.7);
    border-radius: 50%;
    position: absolute;
    animation: pulse 0.7s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.2); opacity: 1; }
  }

  .piece {
    width: 75%;
    height: 75%;
    border-radius: 50%;
    cursor: pointer;
    position: relative;
    transition: transform 0.15s, box-shadow 0.15s;
    z-index: 2;
  }
  .piece:hover { transform: scale(1.08); }
  .piece.red-piece {
    background: radial-gradient(circle at 35% 35%, #ff6b6b, #c0392b);
    border: 3px solid #922b21;
    box-shadow: 0 3px 8px rgba(0,0,0,0.4), inset 0 -2px 4px rgba(0,0,0,0.2);
  }
  .piece.black-piece {
    background: radial-gradient(circle at 35% 35%, #636e72, #2d3436);
    border: 3px solid #1a1a1a;
    box-shadow: 0 3px 8px rgba(0,0,0,0.4), inset 0 -2px 4px rgba(0,0,0,0.2);
  }
  .piece.selected {
    transform: scale(1.1);
    box-shadow: 0 0 0 4px #f1c40f, 0 4px 15px rgba(241, 196, 15, 0.6);
  }
  .piece.king::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.6em;
    color: #f1c40f;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  }
  .piece-num {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 0.85em;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.7);
    z-index: 3;
    pointer-events: none;
    user-select: none;
  }
  .piece.king .piece-num {
    top: 28%;
    font-size: 0.7em;
  }

  #prompt-box {
    margin-top: 14px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 16px 24px;
    max-width: min(90vw, 500px);
    width: 100%;
    text-align: center;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
  }
  #prompt-box .label {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #f1c40f;
    margin-bottom: 6px;
  }
  #prompt-box .prompt-text {
    font-size: 1.2rem;
    font-weight: 500;
    line-height: 1.5;
  }
  #thai-text {
    font-size: 1.1rem;
    color: #a8e6cf;
    margin-top: 6px;
    display: none;
    line-height: 1.5;
  }
  #thai-text.show { display: block; }
  #translate-btn {
    margin-top: 10px;
    padding: 6px 18px;
    border: 2px solid #a8e6cf;
    border-radius: 16px;
    background: transparent;
    color: #a8e6cf;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  #translate-btn:hover {
    background: #a8e6cf;
    color: #1a1a2e;
  }

  #score-bar {
    display: flex;
    gap: 30px;
    margin-bottom: 8px;
    font-size: 1rem;
  }
  .score { padding: 4px 14px; border-radius: 10px; font-weight: 600; }
  .score.red { background: #c0392b; }
  .score.black { background: #2c3e50; }

  #reset-btn {
    margin-top: 12px;
    padding: 8px 28px;
    border: none;
    border-radius: 20px;
    background: #e67e22;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  #reset-btn:hover { background: #d35400; }

  #winner-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #winner-overlay.show { display: flex; }
  #winner-box {
    background: #fff;
    color: #333;
    padding: 40px 50px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  #winner-box h2 { font-size: 2rem; margin-bottom: 10px; }
  #winner-box button {
    margin-top: 16px;
    padding: 10px 30px;
    border: none;
    border-radius: 20px;
    background: #27ae60;
    color: #fff;
    font-size: 1.1rem;
    cursor: pointer;
    font-weight: 600;
  }
  #winner-box button:hover { background: #219a52; }
</style>
</head>
<body>

<h1>Checkers Advanced Conversation</h1>
<div id="score-bar">
  <span class="score red"> Red: <span id="red-score">12</span></span>
  <span class="score black"> Black: <span id="black-score">12</span></span>
</div>
<div id="turn-indicator" class="red">Red's Turn</div>

<div id="board-container">
  <div id="board"></div>
</div>

<div id="prompt-box">
  <div class="label">Advanced Conversation Prompt</div>
  <div class="prompt-text" id="prompt-text">Make a move to get a challenging question!</div>
  <div id="thai-text"></div>
  <button id="translate-btn" onclick="toggleThai()">  1/4</button>
</div>

<button id="reset-btn" onclick="initGame()">New Game</button>

<div id="winner-overlay">
  <div id="winner-box">
    <h2 id="winner-msg"></h2>
    <p>Excellent conversation practice!</p>
    <button onclick="initGame(); document.getElementById('winner-overlay').classList.remove('show');">Play Again</button>

<script>

  "How do you overcome procrastination?",
  "What is the difference between confidence and arrogance?",
  "How do you develop emotional intelligence?",
  "What is the role of failure in personal growth?",
  "How do you stay positive during difficult times?",
  "What is the relationship between discipline and freedom?",
  "How do you develop self-awareness?",
  "What is the importance of solitude?",
  "How do you balance ambition and contentment?"

const thaiTranslations = [

  " 1/4",

];

let currentPromptIdx = -1;
let usedPrompts = [];
let board = [];   // 8x8: null, {color:'red'|'black', king:false}
let currentTurn = 'red';
let selectedPiece = null; // {row, col}
let validMoves = [];      // [{row, col, jumpRow?, jumpCol?}]

function initGame() {
  board = [];
  for (let r = 0; r < 8; r++) {
    board[r] = [];
    for (let c = 0; c < 8; c++) {
      board[r][c] = null;
      if ((r + c) % 2 === 1) {
        if (r < 3) board[r][c] = { color: 'black', king: false, num: 0 };
        if (r > 4) board[r][c] = { color: 'red', king: false, num: 0 };
      }
    }
  }
  // Assign numbers 1-12 to each color
  let redNum = 1, blackNum = 1;
  for (let r = 7; r >= 0; r--)
    for (let c = 0; c < 8; c++)
      if (board[r][c] && board[r][c].color === 'red') board[r][c].num = redNum++;
  for (let r = 0; r < 8; r++)
    for (let c = 0; c < 8; c++)
      if (board[r][c] && board[r][c].color === 'black') board[r][c].num = blackNum++;

  currentTurn = 'red';
  selectedPiece = null;
  validMoves = [];
  usedPrompts = [];
  currentPromptIdx = -1;
  updateTurnIndicator();
  updateScores();
  render();
  document.getElementById('prompt-text').textContent = 'Make a move to get a challenging question!';
  document.getElementById('thai-text').textContent = '';
  document.getElementById('thai-text').classList.remove('show');
}

function updateTurnIndicator() {
  const el = document.getElementById('turn-indicator');
  el.textContent = currentTurn === 'red' ? "Red's Turn" : "Black's Turn";
  el.className = currentTurn;
}

function updateScores() {
  let red = 0, black = 0;
  for (let r = 0; r < 8; r++)
    for (let c = 0; c < 8; c++)
      if (board[r][c]) board[r][c].color === 'red' ? red++ : black++;
  document.getElementById('red-score').textContent = red;
  document.getElementById('black-score').textContent = black;
  if (red === 0) showWinner('Black');
  if (black === 0) showWinner('Red');
}

function showWinner(color) {
  document.getElementById('winner-msg').textContent = color + ' Wins! ';
  document.getElementById('winner-overlay').classList.add('show');
}

function getValidMoves(r, c) {
  const piece = board[r][c];
  if (!piece) return [];
  const moves = [];
  const dirs = [];
  if (piece.color === 'red' || piece.king) dirs.push(-1); // up
  if (piece.color === 'black' || piece.king) dirs.push(1); // down
  const sides = [-1, 1];

  for (const dr of dirs) {
    for (const dc of sides) {
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8) {
        if (!board[nr][nc]) {
          moves.push({ row: nr, col: nc, isJump: false });
        } else if (board[nr][nc].color !== piece.color) {
          const jr = nr + dr, jc = nc + dc;
          if (jr >= 0 && jr < 8 && jc >= 0 && jc < 8 && !board[jr][jc]) {
            moves.push({ row: jr, col: jc, isJump: true, jumpRow: nr, jumpCol: nc });
          }
        }
      }
    }
  }
  return moves;
}

function hasJumpMoves(color) {
  for (let r = 0; r < 8; r++)
    for (let c = 0; c < 8; c++)
      if (board[r][c] && board[r][c].color === color) {
        const moves = getValidMoves(r, c);
        if (moves.some(m => m.isJump)) return true;
      }
  return false;
}

function hasAnyMoves(color) {
  for (let r = 0; r < 8; r++)
    for (let c = 0; c < 8; c++)
      if (board[r][c] && board[r][c].color === color)
        if (getValidMoves(r, c).length > 0) return true;
  return false;
}

function selectPiece(r, c) {
  if (!board[r][c] || board[r][c].color !== currentTurn) return;

  const mustJump = hasJumpMoves(currentTurn);
  let moves = getValidMoves(r, c);
  if (mustJump) moves = moves.filter(m => m.isJump);
  if (moves.length === 0) return;

  selectedPiece = { row: r, col: c };
  validMoves = moves;
  render();
}

function movePiece(target) {
  const move = validMoves.find(m => m.row === target.row && m.col === target.col);
  if (!move) return;

  const sr = selectedPiece.row, sc = selectedPiece.col;
  board[move.row][move.col] = board[sr][sc];
  board[sr][sc] = null;

  let captured = false;
  if (move.isJump) {
    board[move.jumpRow][move.jumpCol] = null;
    captured = true;
  }

  // King promotion
  if (board[move.row][move.col].color === 'red' && move.row === 0)
    board[move.row][move.col].king = true;
  if (board[move.row][move.col].color === 'black' && move.row === 7)
    board[move.row][move.col].king = true;

  // Check for chain jump
  if (captured) {
    const nextJumps = getValidMoves(move.row, move.col).filter(m => m.isJump);
    if (nextJumps.length > 0) {
      selectedPiece = { row: move.row, col: move.col };
      validMoves = nextJumps;
      updateScores();
      render();
      showPrompt();
      return; // don't switch turns yet
    }
  }

  selectedPiece = null;
  validMoves = [];
  currentTurn = currentTurn === 'red' ? 'black' : 'red';
  updateTurnIndicator();
  updateScores();
  render();
  showPrompt();

  // Check if next player has moves
  if (!hasAnyMoves(currentTurn)) {
    const winner = currentTurn === 'red' ? 'Black' : 'Red';
    setTimeout(() => showWinner(winner), 300);
  }
}

function showPrompt() {
  if (usedPrompts.length >= prompts.length) usedPrompts = [];
  let idx;
  do {
    idx = Math.floor(Math.random() * prompts.length);
  } while (usedPrompts.includes(idx));
  usedPrompts.push(idx);
  currentPromptIdx = idx;
  document.getElementById('prompt-text').textContent = prompts[idx];
  document.getElementById('thai-text').textContent = '';
  document.getElementById('thai-text').classList.remove('show');
}

function toggleThai() {
  const el = document.getElementById('thai-text');
  if (currentPromptIdx < 0) return;
  if (el.classList.contains('show')) {
    el.classList.remove('show');
  } else {
    el.textContent = thaiTranslations[currentPromptIdx] || '';
    el.classList.add('show');
  }
}

function onCellClick(r, c) {
  // If clicking a valid move destination
  if (selectedPiece && validMoves.find(m => m.row === r && m.col === c)) {
    movePiece({ row: r, col: c });
    return;
  }
  // If clicking own piece
  if (board[r][c] && board[r][c].color === currentTurn) {
    selectPiece(r, c);
    return;
  }
  // Deselect
  selectedPiece = null;
  validMoves = [];
  render();
}

function render() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell ' + ((r + c) % 2 === 0 ? 'light' : 'dark');

      const isValid = validMoves.find(m => m.row === r && m.col === c);
      if (isValid) {
        cell.classList.add(isValid.isJump ? 'valid-jump' : 'valid-move');
      }

      cell.addEventListener('click', () => onCellClick(r, c));

      if (board[r][c]) {
        const piece = document.createElement('div');
        piece.className = 'piece ' + board[r][c].color + '-piece';
        if (board[r][c].king) piece.classList.add('king');
        if (selectedPiece && selectedPiece.row === r && selectedPiece.col === c) {
          piece.classList.add('selected');
        }
        const numSpan = document.createElement('span');
        numSpan.className = 'piece-num';
        numSpan.textContent = board[r][c].num;
        piece.appendChild(numSpan);
        cell.appendChild(piece);
      }

      boardEl.appendChild(cell);
    }
  }
}

initGame();
</script>
